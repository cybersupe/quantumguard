#
# SETUP INSTRUCTIONS:
# 1. Repo → Settings → Secrets and variables → Actions, add:
#    QUANTUMGUARD_API_URL      = https://quantumguard-api.onrender.com
#    RENDER_DEPLOY_HOOK_URL    = (Render dashboard → Deploy Hook)
#    VERCEL_TOKEN              = (vercel.com → Account Settings → Tokens)
#    VERCEL_ORG_ID             = (from .vercel/project.json)
#    VERCEL_PROJECT_ID         = (from .vercel/project.json)
# 2. Optional secrets:
#    QUANTUMGUARD_SCORE_THRESHOLD = 60  (default: 50)
#    QUANTUMGUARD_API_KEY          (if using private API)
# ============================================================

name: QuantumGuard CI/CD

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      score_threshold:
        description: "Fail if quantum score below this"
        required: false
        default: "50"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  QUANTUMGUARD_API_URL: ${{ secrets.QUANTUMGUARD_API_URL || 'https://quantumguard-api.onrender.com' }}
  SCORE_THRESHOLD: ${{ github.event.inputs.score_threshold || secrets.QUANTUMGUARD_SCORE_THRESHOLD || '50' }}

jobs:
  build:
    name: Build React Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: |
          cd dashboard
          npm install

      - name: Build frontend
        run: |
          cd dashboard
          npm run build

  quantum-security-scan:
    name: QuantumGuard Security Scan
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install requests

      - name: Run QuantumGuard Scan
        id: quantumguard_scan
        env:
          GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PYEOF'
          import requests
          import os
          import sys

          api_url = os.environ.get("QUANTUMGUARD_API_URL", "https://quantumguard-api.onrender.com")
          github_url = os.environ.get("GITHUB_REPO_URL", "")
          github_token = os.environ.get("GITHUB_TOKEN", "")
          threshold = int(os.environ.get("SCORE_THRESHOLD", "50"))

          print("=" * 60)
          print("QuantumGuard Security Scan")
          print("=" * 60)
          print(f"Repository: {github_url}")
          print(f"API: {api_url}")
          print(f"Threshold: {threshold}")

          payload = {"github_url": github_url}
          if github_token:
              payload["github_token"] = github_token

          try:
              response = requests.post(
                  f"{api_url}/scan-github",
                  json=payload,
                  timeout=120
              )
              response.raise_for_status()
              data = response.json()
          except requests.exceptions.ConnectionError:
              print("[WARNING] Cannot connect to QuantumGuard API.")
              print("CI will continue because API may be sleeping.")
              sys.exit(0)
          except requests.exceptions.Timeout:
              print("[WARNING] QuantumGuard API timed out.")
              print("CI will continue because Render may be cold-starting.")
              sys.exit(0)
          except Exception as e:
              print(f"[WARNING] Scan failed: {e}")
              sys.exit(0)

          score = (
              data.get("quantum_risk_score")
              or data.get("quantum_readiness_score")
              or data.get("score")
              or 0
          )

          findings = data.get("findings", [])
          total = data.get("total_findings", len(findings))
          severity_summary = data.get("severity_summary", {})

          critical_count = severity_summary.get("CRITICAL", 0)
          high_count = severity_summary.get("HIGH", 0)
          medium_count = severity_summary.get("MEDIUM", 0)

          if not severity_summary and findings:
              critical_count = sum(1 for f in findings if f.get("severity") == "CRITICAL")
              high_count = sum(1 for f in findings if f.get("severity") == "HIGH")
              medium_count = sum(1 for f in findings if f.get("severity") == "MEDIUM")

          print("=" * 60)
          print(f"Quantum Risk Score: {score}/100")
          print(f"Total Findings: {total}")
          print(f"Critical: {critical_count}")
          print(f"High: {high_count}")
          print(f"Medium: {medium_count}")
          print("=" * 60)

          for f in findings[:20]:
              print(f"[{f.get('severity', '?')}] {f.get('issue') or f.get('vulnerability', '?')}")
              print(f"File: {f.get('file', '?')}:{f.get('line', '?')}")
              print(f"Fix: {f.get('fix') or f.get('recommended_fix') or f.get('replacement', '?')}")
              print("-" * 40)

          github_output = os.environ.get("GITHUB_OUTPUT", "")
          if github_output:
              with open(github_output, "a") as out:
                  out.write(f"quantum_score={score}\n")
                  out.write(f"total_findings={total}\n")
                  out.write(f"critical_count={critical_count}\n")

          if int(score) < threshold:
              print(f"[FAIL] Score {score} is below threshold {threshold}")
              sys.exit(1)

          print("[PASS] QuantumGuard score passed.")
          PYEOF

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quantumguard-scan-results
          path: reports/
          if-no-files-found: ignore
          retention-days: 30

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: quantum-security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.RENDER_DEPLOY_HOOK_URL != ''

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: quantum-security-scan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.VERCEL_TOKEN != ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment
        run: |
          cd dashboard
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with Vercel
        run: |
          cd dashboard
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: |
          cd dashboard
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
