# SETUP INSTRUCTIONS:
# 1. Go to your repo → Settings → Secrets and variables → Actions
# 2. Add secret: QUANTUMGUARD_API_URL = https://quantumguard-api.onrender.com
# 3. Optionally add: QUANTUMGUARD_SCORE_THRESHOLD = 60  (default: 50)
# 4. Optionally add: QUANTUMGUARD_API_KEY (if using private API)
# ============================================================

name: QuantumGuard Security Scan

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      score_threshold:
        description: 'Fail if score below this (0-100)'
        required: false
        default: '50'

env:
  QUANTUMGUARD_API_URL: ${{ secrets.QUANTUMGUARD_API_URL || 'https://quantumguard-api.onrender.com' }}
  SCORE_THRESHOLD: ${{ github.event.inputs.score_threshold || secrets.QUANTUMGUARD_SCORE_THRESHOLD || '50' }}

jobs:
  quantum-security-scan:
    name: Quantum Cryptography Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run QuantumGuard Scan
        id: quantumguard_scan
        env:
          GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PYEOF'
          import requests
          import json
          import os
          import sys

          api_url = os.environ.get("QUANTUMGUARD_API_URL", "https://quantumguard-api.onrender.com")
          github_url = os.environ.get("GITHUB_REPO_URL", "")
          github_token = os.environ.get("GITHUB_TOKEN", "")
          threshold = int(os.environ.get("SCORE_THRESHOLD", "50"))

          print("=" * 60)
          print("  QuantumGuard — Post-Quantum Security Scanner")
          print("  Mangsri QuantumGuard LLC | quantumguard.site")
          print("  Standards: NIST FIPS 203, FIPS 204, FIPS 205")
          print("=" * 60)
          print(f"\n[*] Scanning repository: {github_url}")
          print(f"[*] API endpoint: {api_url}")
          print(f"[*] Fail threshold: score < {threshold}")
          print()

          # Call QuantumGuard scan-github API
          payload = {"github_url": github_url}
          if github_token:
              payload["github_token"] = github_token

          try:
              response = requests.post(
                  f"{api_url}/scan-github",
                  json=payload,
                  timeout=120,
              )
              response.raise_for_status()
              data = response.json()
          except requests.exceptions.ConnectionError:
              print(f"[ERROR] Cannot connect to QuantumGuard API at {api_url}")
              print("[INFO]  Set QUANTUMGUARD_API_URL secret in repo settings")
              sys.exit(0)  # Don't fail CI on API connection errors
          except requests.exceptions.Timeout:
              print("[ERROR] QuantumGuard API timed out")
              sys.exit(0)
          except Exception as e:
              print(f"[ERROR] Scan failed: {e}")
              sys.exit(0)

          # ── Print Results ──────────────────────────────────
          score = data.get("quantum_readiness_score", 0)
          total = data.get("total_findings", 0)
          findings = data.get("findings", [])
          severity_summary = data.get("severity_summary", {})
          confidence_summary = data.get("confidence_summary", {})

          print("=" * 60)
          print(f"  QUANTUM READINESS SCORE: {score}/100")
          print("=" * 60)

          # Score interpretation
          if score >= 90:
              print("  Status: EXCELLENT — Well prepared for quantum era")
          elif score >= 70:
              print("  Status: GOOD — Some improvements needed")
          elif score >= 50:
              print("  Status: AT RISK — Significant vulnerabilities found")
          elif score >= 30:
              print("  Status: HIGH RISK — Urgent action required")
          else:
              print("  Status: CRITICAL — Immediate remediation required")

          print()
          print(f"  Total Findings: {total}")
          print(f"  CRITICAL: {severity_summary.get('CRITICAL', 0)}")
          print(f"  HIGH:     {severity_summary.get('HIGH', 0)}")
          print(f"  MEDIUM:   {severity_summary.get('MEDIUM', 0)}")
          print()
          print(f"  Confidence — HIGH: {confidence_summary.get('HIGH', 0)} | MEDIUM: {confidence_summary.get('MEDIUM', 0)} | LOW: {confidence_summary.get('LOW', 0)}")
          print("=" * 60)

          # ── Print HIGH confidence findings only ───────────
          high_conf = [f for f in findings if f.get("confidence") == "HIGH"]
          if high_conf:
              print(f"\n  HIGH CONFIDENCE FINDINGS ({len(high_conf)}):")
              print("-" * 60)
              for f in high_conf[:20]:  # Max 20 in logs
                  print(f"  [{f.get('severity','?')}] {f.get('vulnerability','?')}")
                  print(f"  File: {f.get('file','?')}:{f.get('line','?')}")
                  print(f"  Code: {f.get('code','?')[:80]}")
                  print(f"  Fix:  {f.get('recommended_fix', f.get('replacement','?'))[:100]}")
                  print(f"  Risk: {f.get('risk_explanation','?')[:100]}")
                  print()

          # ── Print CRITICAL findings regardless of confidence ──
          critical = [f for f in findings
                      if f.get("severity") == "CRITICAL" and f.get("confidence") != "LOW"]
          if critical:
              print(f"\n  CRITICAL VULNERABILITIES ({len(critical)}):")
              print("-" * 60)
              for f in critical[:10]:
                  print(f"  {f.get('file','?')}:{f.get('line','?')} — {f.get('vulnerability','?')}")
                  print(f"  Replace with: {f.get('replacement','?')}")
                  print(f"  Priority: {f.get('migration_priority','?')}")
                  print()

          print("=" * 60)
          print(f"\n  Full report: {api_url}/docs")
          print(f"  Scan online: https://quantumguard.site")
          print("=" * 60)

          # ── Write score to GitHub output ───────────────────
          github_output = os.environ.get("GITHUB_OUTPUT", "")
          if github_output:
              with open(github_output, "a") as out:
                  out.write(f"quantum_score={score}\n")
                  out.write(f"total_findings={total}\n")
                  out.write(f"critical_count={severity_summary.get('CRITICAL', 0)}\n")

          # ── Fail check ─────────────────────────────────────
          if score < threshold:
              critical_count = severity_summary.get("CRITICAL", 0)
              print(f"\n[FAIL] Quantum Readiness Score {score} is below threshold {threshold}")
              if critical_count > 0:
                  print(f"[FAIL] {critical_count} CRITICAL vulnerabilities must be fixed")
              print("[INFO] Visit https://quantumguard.site to fix issues")
              sys.exit(1)
          else:
              print(f"\n[PASS] Score {score} meets threshold {threshold}")

          PYEOF

      - name: Upload scan results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quantumguard-scan-results
          path: |
            reports/
          if-no-files-found: ignore
          retention-days: 30

      - name: Post summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const score = '${{ steps.quantumguard_scan.outputs.quantum_score }}';
            const findings = '${{ steps.quantumguard_scan.outputs.total_findings }}';
            const critical = '${{ steps.quantumguard_scan.outputs.critical_count }}';

            if (!score) return;

            const emoji = parseInt(score) >= 70 ? '✅' : parseInt(score) >= 50 ? '⚠️' : '🚨';
            const body = `## ${emoji} QuantumGuard Security Scan Results

            | Metric | Value |
            |--------|-------|
            | Quantum Readiness Score | **${score}/100** |
            | Total Findings | ${findings} |
            | Critical Vulnerabilities | ${critical} |

            > Powered by [QuantumGuard](https://quantumguard.site) — Mangsri QuantumGuard LLC
            > Standards: NIST FIPS 203, FIPS 204, FIPS 205`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
