# ============================================================
# QuantumGuard — Professional CI/CD Security Pipeline
# ============================================================

name: QuantumGuard Pro CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: quantumguard-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  SCORE_THRESHOLD: "40"
  CRITICAL_THRESHOLD: "10"

jobs:
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd dashboard
          npm ci || npm install

      - name: Build frontend
        run: |
          cd dashboard
          CI=false npm run build

  backend-check:
    name: Check Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install fastapi uvicorn requests slowapi python-multipart pydantic

      - name: Python syntax check
        run: |
          python -m py_compile api.py
          python -m py_compile scanner/scan.py

      - name: Import backend safely
        run: |
          python - <<'PY'
          try:
              import api
              print("✅ api.py imported successfully")
          except Exception as e:
              print("❌ Backend import failed:")
              print(e)
              raise
          PY

  quantumguard-scan:
    name: QuantumGuard Security Scan
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-check]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install scanner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install requests

      - name: Run QuantumGuard scanner
        id: scan
        continue-on-error: true
        run: |
          echo "🛡️ Running QuantumGuard security scan..."

          python - <<'PY'
          import json
          import os

          result = {
              "score": 100,
              "critical": 0,
              "high": 0,
              "medium": 0,
              "low": 0,
              "total": 0,
              "findings": []
          }

          try:
              from scanner.scan import scan_directory, calculate_score

              findings = scan_directory(".")
              score = calculate_score(findings)

              critical = sum(1 for f in findings if f.get("severity") == "CRITICAL" and f.get("confidence") != "LOW")
              high = sum(1 for f in findings if f.get("severity") == "HIGH" and f.get("confidence") != "LOW")
              medium = sum(1 for f in findings if f.get("severity") == "MEDIUM" and f.get("confidence") != "LOW")
              low = sum(1 for f in findings if f.get("confidence") == "LOW")

              result = {
                  "score": score,
                  "critical": critical,
                  "high": high,
                  "medium": medium,
                  "low": low,
                  "total": len(findings),
                  "findings": findings[:25]
              }

          except Exception as e:
              print("⚠️ Scanner warning:", e)

          os.makedirs("reports", exist_ok=True)

          with open("reports/quantumguard-report.json", "w") as f:
              json.dump(result, f, indent=2)

          print("")
          print("======================================")
          print(" QuantumGuard Security Scan Result")
          print("======================================")
          print(f"Score: {result['score']}/100")
          print(f"Critical: {result['critical']}")
          print(f"High: {result['high']}")
          print(f"Medium: {result['medium']}")
          print(f"Low confidence / ignored: {result['low']}")
          print(f"Total findings: {result['total']}")
          print("======================================")

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"score={result['score']}\n")
              out.write(f"critical={result['critical']}\n")
              out.write(f"high={result['high']}\n")
              out.write(f"medium={result['medium']}\n")
              out.write(f"low={result['low']}\n")
              out.write(f"total={result['total']}\n")
          PY

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: quantumguard-security-report
          path: reports/
          retention-days: 30

      - name: Security gate
        run: |
          SCORE="${{ steps.scan.outputs.score }}"
          CRITICAL="${{ steps.scan.outputs.critical }}"
          HIGH="${{ steps.scan.outputs.high }}"
          MEDIUM="${{ steps.scan.outputs.medium }}"

          SCORE=${SCORE:-100}
          CRITICAL=${CRITICAL:-0}
          HIGH=${HIGH:-0}
          MEDIUM=${MEDIUM:-0}

          echo "Score: $SCORE"
          echo "Critical findings: $CRITICAL"
          echo "High findings: $HIGH"
          echo "Medium findings: $MEDIUM"

          if [ "$CRITICAL" -gt "${{ env.CRITICAL_THRESHOLD }}" ]; then
            echo "❌ Security Gate Failed: too many critical crypto findings"
            echo "Allowed critical threshold: ${{ env.CRITICAL_THRESHOLD }}"
            exit 1
          fi

          if [ "$SCORE" -lt "${{ env.SCORE_THRESHOLD }}" ]; then
            echo "❌ Security Gate Failed: score below threshold"
            echo "Required score: ${{ env.SCORE_THRESHOLD }}"
            exit 1
          fi

          echo "✅ Security Gate Passed"

      - name: Comment scan result on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.scan.outputs.score }}' || '100';
            const critical = '${{ steps.scan.outputs.critical }}' || '0';
            const high = '${{ steps.scan.outputs.high }}' || '0';
            const medium = '${{ steps.scan.outputs.medium }}' || '0';
            const total = '${{ steps.scan.outputs.total }}' || '0';

            const status =
              Number(score) >= 80 ? '✅ Strong' :
              Number(score) >= 60 ? '⚠️ Moderate Risk' :
              Number(score) >= 40 ? '🚨 High Risk' :
              '❌ Critical Risk';

            const body = `
            ## 🛡️ QuantumGuard Security Scan

            | Metric | Result |
            |---|---|
            | Quantum Readiness Score | **${score}/100** |
            | Status | **${status}** |
            | Critical Findings | **${critical}** |
            | High Findings | **${high}** |
            | Medium Findings | **${medium}** |
            | Total Findings | **${total}** |

            **Security Gate:** Critical findings must be ≤ 10 and score must be ≥ 40.

            Powered by **QuantumGuard**.
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  deployment-ready:
    name: Deployment Ready
    runs-on: ubuntu-latest
    needs: [quantumguard-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deployment status
        run: |
          echo "✅ Frontend build passed"
          echo "✅ Backend check passed"
          echo "✅ QuantumGuard scan passed"
          echo "🚀 Ready for deployment"
