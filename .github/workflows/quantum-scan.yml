# SETUP INSTRUCTIONS:
# 1. Repo → Settings → Secrets and variables → Actions, add:
#    QUANTUMGUARD_API_URL      = https://quantumguard-api.onrender.com
#    RENDER_DEPLOY_HOOK_URL    = (Render dashboard → Deploy Hook)
#    VERCEL_TOKEN              = (vercel.com → Account Settings → Tokens)
#    VERCEL_ORG_ID             = (from .vercel/project.json)
#    VERCEL_PROJECT_ID         = (from .vercel/project.json)
# 2. Optional secrets:
#    QUANTUMGUARD_SCORE_THRESHOLD = 60  (default: 50)
#    QUANTUMGUARD_API_KEY          (if using private API)
# ============================================================

name: QuantumGuard Advanced CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: quantumguard-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  SCORE_THRESHOLD: "50"

jobs:
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: |
          cd dashboard
          npm install

      - name: Build frontend
        run: |
          cd dashboard
          CI=false npm run build

  backend-check:
    name: Check Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install fastapi uvicorn requests

      - name: Import backend safely
        run: |
          python - <<'PY'
          try:
              import api
              print("✅ api.py imported successfully")
          except Exception as e:
              print("❌ Backend import failed:")
              print(e)
              raise
          PY

  quantumguard-scan:
    name: QuantumGuard Repo Scan
    runs-on: ubuntu-latest
    needs: [frontend-build, backend-check]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install scanner dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install requests

      - name: Run local scanner if available
        id: scan
        continue-on-error: true
        run: |
          echo "Running QuantumGuard local scan..."

          python - <<'PY'
          import json
          import os
          import sys

          result = {
              "score": 100,
              "critical": 0,
              "high": 0,
              "medium": 0,
              "findings": []
          }

          try:
              from scanner.scan import scan_directory

              findings = scan_directory(".")
              critical = sum(1 for f in findings if f.get("severity") == "CRITICAL")
              high = sum(1 for f in findings if f.get("severity") == "HIGH")
              medium = sum(1 for f in findings if f.get("severity") == "MEDIUM")

              penalty = critical * 30 + high * 15 + medium * 5
              score = max(0, 100 - min(penalty, 80))

              result = {
                  "score": score,
                  "critical": critical,
                  "high": high,
                  "medium": medium,
                  "findings": findings[:10]
              }

          except Exception as e:
              print("Scanner warning:", e)

          os.makedirs("reports", exist_ok=True)

          with open("reports/quantumguard-report.json", "w") as f:
              json.dump(result, f, indent=2)

          print("QuantumGuard Score:", result["score"])
          print("Critical:", result["critical"])
          print("High:", result["high"])
          print("Medium:", result["medium"])

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"score={result['score']}\n")
              out.write(f"critical={result['critical']}\n")
              out.write(f"high={result['high']}\n")
              out.write(f"medium={result['medium']}\n")
          PY

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: quantumguard-security-report
          path: reports/
          retention-days: 30

      - name: Comment scan result on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.scan.outputs.score }}' || 'N/A';
            const critical = '${{ steps.scan.outputs.critical }}' || '0';
            const high = '${{ steps.scan.outputs.high }}' || '0';
            const medium = '${{ steps.scan.outputs.medium }}' || '0';

            const status = Number(score) >= 70 ? '✅ Good' : Number(score) >= 50 ? '⚠️ At Risk' : '🚨 Critical';

            const body = `
            ## 🛡️ QuantumGuard Security Scan

            | Metric | Result |
            |---|---|
            | Quantum Risk Score | **${score}/100** |
            | Status | **${status}** |
            | Critical Findings | **${critical}** |
            | High Findings | **${high}** |
            | Medium Findings | **${medium}** |

            **Recommendation:** Review cryptographic risks before merging.

            Powered by **QuantumGuard**.
            `;

            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Security gate
        run: |
          SCORE="${{ steps.scan.outputs.score }}"
          CRITICAL="${{ steps.scan.outputs.critical }}"

          echo "Score: $SCORE"
          echo "Critical findings: $CRITICAL"

          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ CI failed: critical crypto findings detected"
            exit 1
          fi

          if [ "$SCORE" -lt "${{ env.SCORE_THRESHOLD }}" ]; then
            echo "❌ CI failed: score below threshold"
            exit 1
          fi

          echo "✅ Security gate passed"

  deploy-note:
    name: Deployment Ready
    runs-on: ubuntu-latest
    needs: [quantumguard-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deployment status
        run: |
          echo "✅ Build passed"
          echo "✅ Backend passed"
          echo "✅ QuantumGuard scan passed"
          echo "Ready for Render/Vercel deployment"
